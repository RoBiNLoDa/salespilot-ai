<section>
    <div class="title-customers">
        <h1>Clientes</h1>
        <span class="spacer"></span>
        <button matButton="elevated" (click)="openCreateDialog()" ><mat-icon>add</mat-icon> Nuevo Cliente</button>
    </div>
    <div class="content-card">

        <mat-card class="card-table" appearance="outlined">
            <mat-card-header>
                <mat-form-field appearance="outline" class=" search">

                    <mat-label>Buscar</mat-label>
                    <input matInput type="text">
                    <mat-icon matSuffix>search</mat-icon>

                </mat-form-field>
            </mat-card-header>
            <mat-card-content>
                <table mat-table [dataSource]="customers()" class="mat-elevation-z8">

                    <!-- Name Column -->
                    <ng-container matColumnDef="name">
                        <th mat-header-cell *matHeaderCellDef> Nombre </th>
                        <td mat-cell *matCellDef="let element"> {{ element.firstName }} {{ element.lastName }} </td>
                    </ng-container>

                    <ng-container matColumnDef="company">
                        <th mat-header-cell *matHeaderCellDef> Empresa </th>
                        <td mat-cell *matCellDef="let element"> {{element.company}} </td>
                    </ng-container>

                    <ng-container matColumnDef="city">
                        <th mat-header-cell *matHeaderCellDef> Ciudad </th>
                        <td mat-cell *matCellDef="let element"> {{element.city}} </td>
                    </ng-container>

                    <ng-container matColumnDef="status">
                        <th mat-header-cell *matHeaderCellDef> Estado </th>
                        <td mat-cell *matCellDef="let element"><mat-chip>{{element.active ? 'Activo' :
                                'Inactivo'}}</mat-chip> </td>
                    </ng-container>

                    <ng-container matColumnDef="actions">
                        <th mat-header-cell *matHeaderCellDef> Acciones </th>
                        <td mat-cell *matCellDef="let element"><button mat-icon-button (click)="editCustomer(element)">
                                <mat-icon>edit</mat-icon>
                            </button>

                            <button mat-icon-button>
                                <mat-icon>delete</mat-icon>
                            </button>
                        </td>
                    </ng-container>

                    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
                    <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
                </table>

            </mat-card-content>
        </mat-card>

    </div>

</section>
