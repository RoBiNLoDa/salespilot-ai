<h2 mat-dialog-title>

    {{ editing() ? 'Editar Cliente' : 'Nuevo Cliente' }}

</h2>

<mat-dialog-content>

    <app-customer-form [customer]="customer" />

</mat-dialog-content>

<mat-dialog-actions align="end">

    <button matButton (click)="cancel()" [disabled]="loading.loading()">
        Cancelar
    </button>

    <button mat-flat-button color="primary" [disabled]="loading.loading()" (click)="save()">

        @if (loading.loading()) {
        <mat-spinner diameter="18"></mat-spinner>
        }

        <span>Guardar</span>

    </button>

</mat-dialog-actions>
