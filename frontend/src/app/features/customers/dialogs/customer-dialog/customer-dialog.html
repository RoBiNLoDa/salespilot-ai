<h2 mat-dialog-title>

    {{ editing() ? 'Editar Cliente' : 'Nuevo Cliente' }}

</h2>

<mat-dialog-content>

    <app-customer-form [customer]="customer" />

</mat-dialog-content>

<mat-dialog-actions align="end">

    <button matButton (click)="cancel()">

        Cancelar

    </button>

    <button matButton="filled" (click)="save()">

        Guardar

    </button>

</mat-dialog-actions>
