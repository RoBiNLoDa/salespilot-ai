<mat-nav-list>

  @for (item of navigation.items; track item.route) {

    <a
      mat-list-item
      [routerLink]="item.route"
      routerLinkActive="active-link"
      [routerLinkActiveOptions]="{ exact: true }">

      <mat-icon matListItemIcon>
        {{ item.icon }}
      </mat-icon>

      <span matListItemTitle>
        {{ item.label }}
      </span>

    </a>

  }

</mat-nav-list>
