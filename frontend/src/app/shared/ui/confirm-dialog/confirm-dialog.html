<h2 mat-dialog-title>
    {{ data.title }}
</h2>

<mat-dialog-content>

    <p>{{ data.message }}</p>

</mat-dialog-content>

<mat-dialog-actions>

    <button matButton (click)="cancel()">
        {{ data.cancelText ?? 'Cancelar' }}
    </button>

    <button
        
        matButton="filled"
        (click)="confirm()">

        {{ data.confirmText ?? 'Aceptar' }}

    </button>

</mat-dialog-actions>
